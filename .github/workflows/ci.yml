name: CI Pipeline

on:
push:
branches: [ solution/muskan-sikka ]

pull_request:
branches: [ main ]

jobs:
build-and-test:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v3

  - name: Setup Node.js
    uses: actions/setup-node@v3
    with:
      node-version: 18

  - name: Install backend dependencies
    working-directory: backend
    run: npm install

  - name: Run ESLint
    working-directory: backend
    run: npx eslint . || true

  - name: Build and start containers
    run: docker compose up -d --build

  - name: Wait for backend to start
    run: sleep 20

  - name: Health check
    run: curl --fail http://localhost:3001/api/orders
```
